<header class="site-header">
  <div class="header-inner">
    <div class="left-group">
      <div class="lang-switch" [attr.aria-label]="'HEADER.LANG_SWITCH' | translate">
        <button
          (click)="useLanguage('en')"
          class="lang"
          [class.is-active]="currentLanguage === 'en'"
          type="button"
        >
          EN
        </button>
        <button
          (click)="useLanguage('de')"
          class="lang"
          [class.is-active]="currentLanguage === 'de'"
          type="button"
        >
          DE
        </button>
      </div>

      <nav class="main-nav" [attr.aria-label]="'HEADER.MAIN_NAV' | translate">
        <a
          href="#about"
          (click)="setActiveSection('about')"
          [class.is-active]="activeSection === 'about'"
          [attr.aria-current]="activeSection === 'about' ? 'page' : null"
        >
          {{ 'HEADER.ABOUT' | translate }}
        </a>
        <a
          href="#skills"
          (click)="setActiveSection('skills')"
          [class.is-active]="activeSection === 'skills'"
          [attr.aria-current]="activeSection === 'skills' ? 'page' : null"
        >
          {{ 'HEADER.SKILLS' | translate }}
        </a>
        <a
          href="#projects"
          (click)="setActiveSection('projects')"
          [class.is-active]="activeSection === 'projects'"
          [attr.aria-current]="activeSection === 'projects' ? 'page' : null"
        >
          {{ 'HEADER.PROJECTS' | translate }}
        </a>
      </nav>
    </div>

    <a class="logo-link" [routerLink]="['/']" [attr.aria-label]="'HEADER.HOMEPAGE' | translate">
      <img src="/bilder/logo_header.png" alt="Angelo Niessen Logo" />
    </a>

    <button
      class="mobile-menu-toggle"
      type="button"
      [attr.aria-label]="'HEADER.OPEN_MENU' | translate"
      [attr.aria-expanded]="menuOpen"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="mobile-menu" *ngIf="menuOpen">
    <nav class="mobile-nav" [attr.aria-label]="'HEADER.MOBILE_NAV' | translate">
      <a href="#about" (click)="setActiveSection('about'); closeMenu()">{{ 'HEADER.ABOUT' | translate }}</a>
      <a href="#skills" (click)="setActiveSection('skills'); closeMenu()">{{ 'HEADER.SKILLS' | translate }}</a>
      <a href="#projects" (click)="setActiveSection('projects'); closeMenu()">{{ 'HEADER.PROJECTS' | translate }}</a>
    </nav>

    <div class="lang-switch mobile-lang" [attr.aria-label]="'HEADER.LANG_SWITCH' | translate">
      <button
        class="lang"
        [class.is-active]="currentLanguage === 'en'"
        type="button"
        (click)="useLanguage('en')"
      >
        EN
      </button>
      <button
        class="lang"
        [class.is-active]="currentLanguage === 'de'"
        type="button"
        (click)="useLanguage('de')"
      >
        DE
      </button>
    </div>
  </div>
</header>

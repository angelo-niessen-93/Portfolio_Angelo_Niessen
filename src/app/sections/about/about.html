<section class="section" id="about">
  <div class="section-inner">
    <div class="about-media">
      <div class="photo-frame">
        <img src="/bilder/Angelo_Niessen.png" alt="Portrait of Angelo Niessen" />
      </div>
    </div>

    <div class="about-content">
      <p class="section-label">{{ 'ABOUT.SECTION_LABEL' | translate }}</p>
      <article class="about-card">
        <h2>{{ 'ABOUT.TITLE' | translate }}</h2>
        <p class="about-text">
          {{ 'ABOUT.TEXT' | translate }}
        </p>

        <ul class="about-points">
          <li>
            <span class="icon">
              <img src="/icons/ocation_on.png" alt="" aria-hidden="true" />
            </span>
            <p>{{ 'ABOUT.POINTS.LOCATION' | translate }}</p>
          </li>
          <li>
            <span class="icon">
              <img src="/icons/cognition.png" alt="" aria-hidden="true" />
            </span>
            <p>{{ 'ABOUT.POINTS.LEARNING' | translate }}</p>
          </li>
          <li>
            <span class="icon">
              <img src="/icons/Quality.png" alt="" aria-hidden="true" />
            </span>
            <p>{{ 'ABOUT.POINTS.PROBLEM_SOLVING' | translate }}</p>
          </li>
        </ul>
      </article>
    </div>
  </div>
</section>

<section class="section" id="skills">
  <div class="section-inner">
    <div class="skills-left">
      <p class="section-label">{{ 'SKILLS.SECTION_LABEL' | translate }}</p>

        <h2>{{ 'SKILLS.TITLE' | translate }}</h2>
        <p class="skills-text">
          {{ 'SKILLS.TEXT' | translate }}
        </p>
        <p class="skills-cta-text">{{ 'SKILLS.CTA_PREFIX' | translate }} <span>{{ 'SKILLS.CTA_HIGHLIGHT' | translate }}</span></p>

          {{ 'SKILLS.SUBTEXT' | translate }}

    </div>

    <div class="skills-grid-wrap">

        <article><img src="/icons/GIT.png" alt="" aria-hidden="true" /></article>
        <article><img src="/icons/Rest-Api.png" alt="" aria-hidden="true" /></article>
        <article><img src="/icons/Scrum.png" alt="" aria-hidden="true" /></article>
        <article><img src="/icons/18. Growth Mindset interaction.png" alt="" aria-hidden="true" /></article>
      </div>
    </div>
  </div>
